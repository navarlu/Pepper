services:
  livekit:
    image: livekit/livekit-server:v1.9.11
    env_file:
      - ../.env
    command:
      - --dev
      - --bind=0.0.0.0
      - --port=${LIVEKIT_PORT}
      - --udp-port=${LIVEKIT_UDP_PORT}
      - --keys=${LIVEKIT_KEYS}          # ← this is the important change
      - --redis-host=${LIVEKIT_REDIS_HOST}
    ports:
      - "${LIVEKIT_PORT}:${LIVEKIT_PORT}/tcp"
      - "${LIVEKIT_UDP_PORT}:${LIVEKIT_UDP_PORT}/udp"
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine3.21
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
    restart: unless-stopped

  
  playground:
    image: node:18.20.8
    working_dir: /app
    command: ["npm", "run", "dev"]
    volumes:
      - ../web/agents-playground:/app
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  weaviate:
      image: cr.weaviate.io/semitechnologies/weaviate:1.35.1
      ports:
        - "8080:8080"
        - "50051:50051"
      restart: unless-stopped
      environment:
        QUERY_DEFAULTS_LIMIT: 25
        AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
        PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
        DEFAULT_VECTORIZER_MODULE: text2vec-openai
        ENABLE_MODULES: text2vec-openai
        OPENAI_APIKEY: ${OPENAI_API_KEY}
        CLUSTER_HOSTNAME: "node1"
      volumes:
        - ./weaviate_data:/var/lib/weaviate
