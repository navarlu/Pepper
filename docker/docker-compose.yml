services:
  livekit:
    image: livekit/livekit-server:v1.9.11
    command:
      - --dev
      - --bind=0.0.0.0
      - --port=7880
      - --udp-port=7882
      - --keys=${LIVEKIT_KEYS}
      - --redis-host=redis:6379
    ports:
      - "7880:7880/tcp"
      - "7882:7882/udp"
    restart: on-failure

  redis:
    image: redis:7.4.2-alpine3.21
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
    restart: on-failure

  voice-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    working_dir: /workspace
    command: ["uv", "run", "python", "-m", "voice-agent.src.agent", "dev"]
    volumes:
      - ..:/workspace
    environment:
      LIVEKIT_URL: ws://livekit:7880
      SESSION_MANAGER_URL: http://session-manager:8787
      WEAVIATE_HOST: weaviate
      ANIMATION_BRIDGE_URL: http://host.docker.internal:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - livekit
      - redis
      - weaviate
    restart: on-failure

  session-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    working_dir: /workspace
    command: ["uv", "run", "python", "robot/src/session_manager.py"]
    volumes:
      - ..:/workspace
    environment:
      LIVEKIT_HOST_WS_URL: ws://127.0.0.1:7880
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_HTTP_URL: http://livekit:7880
      BRIDGE_URL: http://host.docker.internal:5000
      SESSION_MANAGER_HOST: 0.0.0.0
      SESSION_MANAGER_PORT: 8787
      LIVEKIT_SESSION_FILE: /workspace/web/agents-playground/token-latest.json
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WEAVIATE_HOST: weaviate
      WEAVIATE_HTTP_PORT: 8080
      BRIDGE_TCP_URL: tcp://host.docker.internal:55555
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8787:8787"
    depends_on:
      - livekit
      - redis
      - weaviate
    restart: on-failure

  bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    working_dir: /workspace
    command: ["uv", "run", "python", "robot/src/bridge3.py"]
    volumes:
      - ..:/workspace
    environment:
      PEPPER_QI_URL: ${PEPPER_QI_URL:-tcp://10.0.0.149:9559}
      BRIDGE_BIND_HOST: "0.0.0.0"
      TCP_PORT: "55555"
      BRIDGE_URL: http://127.0.0.1:5000
    network_mode: host
    restart: on-failure

  listener:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    working_dir: /workspace
    command: ["uv", "run", "python", "robot/src/listener.py"]
    volumes:
      - ..:/workspace
    environment:
      LIVEKIT_URL: ws://livekit:7880
      SESSION_MANAGER_URL: http://session-manager:8787
      LIVEKIT_SESSION_FILE: /workspace/web/agents-playground/token-latest.json
      TCP_HOST: host.docker.internal
      TCP_PORT: "55555"
      BRIDGE_URL: http://host.docker.internal:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - session-manager
      - livekit
      - bridge
    restart: on-failure

  user-client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    working_dir: /workspace
    command: ["uv", "run", "python", "robot/src/user_client.py"]
    volumes:
      - ..:/workspace
      - /dev/snd:/dev/snd
    environment:
      LIVEKIT_URL: ws://127.0.0.1:7880
      SESSION_MANAGER_URL: http://127.0.0.1:8787
      LIVEKIT_SESSION_FILE: /workspace/web/agents-playground/token-latest.json
    network_mode: host
    profiles:
      - audio
    restart: on-failure

  
  playground:
    image: node:18.20.8
    working_dir: /app
    command: ["npm", "run", "dev"]
    volumes:
      - ../web/agents-playground:/app
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ws://127.0.0.1:7880
      NEXT_PUBLIC_LIVEKIT_URL: ws://127.0.0.1:7880
    ports:
      - "3000:3000"
    profiles:
      - debug
    restart: on-failure

  weaviate:
      image: cr.weaviate.io/semitechnologies/weaviate:1.35.1
      ports:
        - "8080:8080"
        - "50051:50051"
      restart: on-failure
      environment:
        QUERY_DEFAULTS_LIMIT: 25
        AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
        PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
        DEFAULT_VECTORIZER_MODULE: text2vec-openai
        ENABLE_MODULES: text2vec-openai
        OPENAI_APIKEY: ${OPENAI_API_KEY}
        CLUSTER_HOSTNAME: "node1"
      volumes:
        - ./weaviate_data:/var/lib/weaviate
